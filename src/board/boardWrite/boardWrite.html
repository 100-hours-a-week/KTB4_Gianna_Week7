<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아무 말 대잔치</title>
    <script defer src="boardWrite.js"></script>

</head>
<body>
    <h1 id="postWriteTitle">게시글 작성</h1>
    <div class="post-write-container">
        <h5>제목*</h5>
        <input id="postTitle" type="text" maxlength="26" placeholder="제목을 입력해주세요. (최대 26글자)"></input>
        <h5>내용*</h5>
        <textarea id="postContent" maxlength="1000" placeholder="내용을 입력해주세요."></textarea>
        <h5>이미지</h5>
        <input id="postUploadedPicture" type="file" accept="image/png, image/jpeg"></input>
    </div>
    <button id="postWriteBtn"><h3>완료</h3></button>

</body>
</html>
