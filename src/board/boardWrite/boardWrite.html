<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아무 말 대잔치</title>
    <link rel="stylesheet" href="boardWrite.css">
    <script type="module" defer src="boardWrite.js"></script>

</head>
<body>
    <div id="headerContainer"></div>

    <main class="post-write-page">
        <h1 id="postWriteTitle">게시글 작성</h1>

        <div class="post-write-container">
            <label for="postTitle">제목*</label>
            <input id="postTitle" type="text" maxlength="26" placeholder="제목을 입력해주세요. (최대 26글자)">

            <label for="postContent">내용*</label>
            <textarea id="postContent" placeholder="내용을 입력해주세요."></textarea>
            <p id="helperText" class="helper-text"></p>

            <label for="postUploadedPicture">이미지</label>
            <input id="postUploadedPicture" type="file" accept="image/png, image/jpeg">
        </div>

        <button id="postWriteBtn" type="button">완료</button>
    </main>

</body>
</html>
