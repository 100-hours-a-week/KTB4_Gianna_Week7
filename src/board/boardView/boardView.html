<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아무 말 대잔치</title>
    <script defer src="./boardView.js"></script>
</head>
<body>
    <h1>게시글 상세 조회</h1>
    <a href="./boardWrite.html"><h3>게시글 수정 버튼</h3></a>
    <div id="post-header">
        <h3 id="title">제목</h3>
        <img src="#" id="post-profile-picture"/> 
        <h4 id="post-author">더미 작성자1</h4>
        <h4 id="post-upload-date">2026-00-00 00:00:00</h4>
        <button id="post-edit-btn">수정</button>
        <button id="post-delete-btn">삭제</button>
    </div>
    <!-- 긴 줄 -->
    <div id="post-container">
        <img src="#" id="post-upload-picture"/> 
        <h6 id="post-content">본문 내용</h6>
    </div>
    <!-- 긴 줄 -->
    <div id ="post-comment-container" class="common-container">
        <textarea placeholder="댓글을 남겨주세요!"></textarea>
        <button id="post-comment-btn">댓글 등록</button>
    </div>
    <div id="comment-list-container"></div>
</body>
</html>
